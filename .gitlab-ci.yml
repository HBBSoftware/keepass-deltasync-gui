# GitLab CI/CD pipeline for keepass-deltasync-gui.
#
# This is the Fyne desktop GUI that wraps the keepass-deltasync CLI. Unlike the
# pure-Go CLI, Fyne needs CGO + a C toolchain and OpenGL/X11 dev headers, so the
# jobs apt-install those. Windows binaries are cross-compiled from Linux with
# mingw-w64. macOS cannot be built on shared Linux runners (it needs the Xcode
# SDK) — see the note at the bottom.
#
# Stages:
#   - test:    `go vet` + build-check on every commit and MR
#   - build:   package Linux + Windows binaries — only on vX.Y.Z tags
#   - release: publish a GitLab Release with download links — same gate
#
# To cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Releases show up at
#   https://gitlab.com/Star95/keepass-deltasync-gui/-/releases

stages:
  - test
  - build
  - release

variables:
  # Image tag; must be >= the `go` directive in go.mod.
  GO_VERSION: "1.24"
  DEBIAN_FRONTEND: "noninteractive"
  # Keep the Go module + build caches inside the project so CI can cache them.
  GOMODCACHE: "$CI_PROJECT_DIR/.gocache/mod"
  GOCACHE: "$CI_PROJECT_DIR/.gocache/build"

default:
  image: golang:${GO_VERSION}-bookworm
  cache:
    key: go-cache
    paths:
      - .gocache/

# Fyne's desktop driver needs these to compile (native Linux CGO build).
.apt_fyne_linux: &apt_fyne_linux
  - apt-get update -qq
  - apt-get install -y -qq --no-install-recommends
      gcc pkg-config libgl1-mesa-dev xorg-dev

# ----------------------------------------------------------------------
# Test: compile-check + vet on every commit / MR
# ----------------------------------------------------------------------

test:
  stage: test
  script:
    - *apt_fyne_linux
    - go vet ./...
    - go build ./...

# ----------------------------------------------------------------------
# Build: package Linux + Windows binaries (only on vX.Y.Z tags)
# ----------------------------------------------------------------------

build:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    # Native Linux deps + mingw for the Windows cross-build.
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends
        gcc gcc-mingw-w64-x86-64 pkg-config libgl1-mesa-dev xorg-dev
        tar xz-utils zip coreutils
    # The `fyne` tool embeds the icon + metadata from FyneApp.toml.
    - go install fyne.io/tools/cmd/fyne@latest
    - export PATH="$(go env GOPATH)/bin:$PATH"
    - export VERSION="${CI_COMMIT_TAG#v}"
    # Pass this job's id forward so the release job can build artifact URLs.
    - echo "BUILD_JOB_ID=$CI_JOB_ID" >> build.env
    - echo "VERSION=$VERSION" >> build.env
    - mkdir -p dist
    # --- Linux (native CGO) → .tar.xz with icon + .desktop file ---
    - echo "==> Packaging Linux"
    - fyne package -os linux
    - mv ./*.tar.xz "dist/keepass-deltasync-gui-${VERSION}-linux-amd64.tar.xz"
    # --- Windows (cross-compiled via mingw-w64) → .exe with embedded icon ---
    # Debian's mingw-w64 enables stack-protector + _FORTIFY_SOURCE by default,
    # but Go's cgo link step doesn't pull in libssp, so glfw's C objects fail to
    # link with "undefined reference to __stack_chk_fail / __chk_fail". Disable
    # both hardening features for the C code so those symbols are never emitted.
    - echo "==> Packaging Windows"
    - CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc
        CGO_CFLAGS="-fno-stack-protector -D_FORTIFY_SOURCE=0"
        fyne package -os windows
    - mv ./*.exe "dist/keepass-deltasync-gui-${VERSION}-windows-amd64.exe"
    # --- Checksums ---
    - cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS
  artifacts:
    name: "keepass-deltasync-gui-${CI_COMMIT_REF_SLUG}"
    reports:
      dotenv: build.env
    paths:
      - dist/keepass-deltasync-gui-*-linux-amd64.tar.xz
      - dist/keepass-deltasync-gui-*-windows-amd64.exe
      - dist/SHA256SUMS
    expire_in: never

# ----------------------------------------------------------------------
# Release: publish a GitLab Release with download links (vX.Y.Z tags)
# ----------------------------------------------------------------------

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG} (gui ${VERSION})"
  release:
    name: 'keepass-deltasync-gui ${VERSION}'
    description: |
      Pre-built keepass-deltasync-gui binaries for ${VERSION}.

      The GUI calls the keepass-deltasync CLI — ship the matching CLI binary
      next to it (or point to it under Settings). Verify integrity with
      SHA256SUMS. Build from source / macOS: see README.md.
    tag_name: '${CI_COMMIT_TAG}'
    assets:
      links:
        - name: 'Linux (amd64) — .tar.xz'
          url: '${CI_PROJECT_URL}/-/jobs/${BUILD_JOB_ID}/artifacts/raw/dist/keepass-deltasync-gui-${VERSION}-linux-amd64.tar.xz'
          link_type: 'package'
        - name: 'Windows (amd64) — .exe'
          url: '${CI_PROJECT_URL}/-/jobs/${BUILD_JOB_ID}/artifacts/raw/dist/keepass-deltasync-gui-${VERSION}-windows-amd64.exe'
          link_type: 'package'
        - name: 'SHA256SUMS'
          url: '${CI_PROJECT_URL}/-/jobs/${BUILD_JOB_ID}/artifacts/raw/dist/SHA256SUMS'
          link_type: 'other'

# ----------------------------------------------------------------------
# macOS note
# ----------------------------------------------------------------------
# A macOS .app cannot be built on the shared Linux runners — Fyne's darwin
# build needs the Xcode SDK. To produce one, run on a macOS runner:
#
#   build:macos:
#     stage: build
#     tags: [macos]                 # a self-hosted/SaaS macOS runner
#     rules:
#       - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
#     script:
#       - go install fyne.io/tools/cmd/fyne@latest
#       - export PATH="$(go env GOPATH)/bin:$PATH"
#       - fyne package -os darwin
#       - ... zip & move "KeePass Delta-Sync.app" into dist/ ...
#
# Until a macOS runner is available, build the .app locally with
# `make package-darwin` on a Mac (see README.md).
